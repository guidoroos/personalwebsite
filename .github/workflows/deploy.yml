name: Deploy RoosMobile Portfolio

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build JS Production
        run: ./gradlew jsBrowserDistribution

      - name: Setup Node.js (voor Prerender)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Prerender Dependencies
        run: npm install puppeteer fs-extra path http-server

      - name: Run Prerender
        run: |
          # 1. Start lokale server op de Gradle output
          npx http-server composeApp/build/dist/js/productionExecutable -p 8080 &
          
          # 2. Wacht even tot de server draait
          sleep 5
          
          # 3. Draai je script (zorg dat prerender.js in de root van je repo staat)
          node prerender.js
          
          # 4. Stop de server
          kill $(jobs -p)

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # We uploaden de door Puppeteer gevulde 'dist' map
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4