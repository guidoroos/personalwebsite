<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Guido Roos</title>
    <link type="text/css" rel="stylesheet" href="/styles.css">

    <!-- Script om de URL te herstellen na een GitHub Pages 404-redirect -->
    <script type="text/javascript">
        (function(l) {
          if (l.search[1] === 'p') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&')
            }).filter(function(s) {
              return s.slice(0, 2) === 'p='
            })[0].slice(2);

            if (decoded !== l.pathname.slice(1)) {
              window.history.replaceState(null, null,
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1).join('/') + '/' + decoded +
                (l.search.slice(1).split('&').filter(function(s) {
                  return s.slice(0, 2) !== 'p='
                }).length ? '?' + l.search.slice(1).split('&').filter(function(s) {
                  return s.slice(0, 2) !== 'p='
                }).join('&').replace(/~and~/g, '&') : '') +
                l.hash
              );
            }
          }
        }(window.location))
    </script>
</head>
<body style="text-align: center; align-content: center">
<div id="root">
</div>

<script type="application/javascript" src="/composeApp.js"></script>
</body>
</html>
