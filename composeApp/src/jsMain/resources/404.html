<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Roos Mobile - Redirecting...</title>
    <script type="text/javascript">
        // Dit script zorgt ervoor dat de huidige pad-informatie niet verloren gaat.
        // Het zet /portfolio om in index.html?p=/portfolio
        var segmentCount = 0; // Zet dit op 1 als je project in een submap staat (bijv. github.io/project/)

        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
    </script>
</head>
<body>
</body>
</html>
